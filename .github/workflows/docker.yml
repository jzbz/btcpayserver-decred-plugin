name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      decred_version:
        description: 'Decred version to build (overrides DECRED_VERSION, e.g. 2.1.5)'
        required: false

env:
  REGISTRY: ghcr.io
  # Single source of truth for the Decred release packaged into the image.
  # This is the Decred version, NOT the plugin version - bump it when Decred
  # ships a new release (or override per-run via workflow_dispatch).
  DECRED_VERSION: '2.1.5'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        id: image
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/decred" >> $GITHUB_OUTPUT

      - name: Resolve Decred version
        id: version
        run: |
          # The Decred version is independent of the plugin's git tag.
          # Use the workflow_dispatch override if provided, else the DECRED_VERSION env.
          VERSION="${{ github.event.inputs.decred_version }}"
          [ -z "$VERSION" ] && VERSION="${{ env.DECRED_VERSION }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.decred
          push: true
          build-args: |
            DECRED_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
