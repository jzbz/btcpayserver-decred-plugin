# Docker compose fragment for btcpayserver-docker.
# Place in: docker-compose-generator/docker-fragments/decred.yml
#
# dcrwallet runs in SPV mode - no dcrd node required.

version: "3"

services:
  dcrwallet:
    restart: unless-stopped
    container_name: btcpayserver_dcrwallet
    image: ${BTCPAY_DCR_IMAGE:-ghcr.io/decred/decred:2.1.5}
    command:
      - dcrwallet
      - --spv
      - --username=btcpay
      - --password=btcpay
      - --rpclisten=0.0.0.0:9110
      - --pass=${BTCPAY_DCR_WALLET_PASSPHRASE}
      # Address generation ignores the gap limit (one address per invoice), so
      # raise it to keep all addresses discoverable on a restore from seed.
      - --gaplimit=200
    expose:
      - "9110"
    volumes:
      - "dcr_wallet:/root/.dcrwallet"

  btcpayserver:
    environment:
      BTCPAY_DCR_WALLET_URI: https://dcrwallet:9110
      BTCPAY_DCR_RPC_USERNAME: btcpay
      BTCPAY_DCR_RPC_PASSWORD: btcpay

volumes:
  dcr_wallet:
